{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Login</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-main">Login</button>
        </form>
    </div>
</section>
{% endblock %}
