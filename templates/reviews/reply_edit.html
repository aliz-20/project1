{% extends 'base.html' %}

{% block title %}Edit Reply{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card">
        <h1>Edit Reply</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn-main">Save Changes</button>
                <a href="{% url 'review_list' %}" class="edit-btn">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
