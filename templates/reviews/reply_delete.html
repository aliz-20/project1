{% extends 'base.html' %}

{% block title %}Delete Reply{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card">
        <h1>Delete Reply</h1>
        <p>Are you sure you want to delete this reply?</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="delete-btn">Yes, delete it</button>
                <a href="{% url 'review_list' %}" class="edit-btn">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
