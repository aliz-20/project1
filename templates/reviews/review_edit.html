{% extends 'base.html' %}

{% block title %}Edit Review{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card">
        <h1>Edit Your Review</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-main">Save Changes</button>
        </form>
    </div>
</section>
{% endblock %}
